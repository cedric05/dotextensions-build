name: Release prod Artifacts
on:
  # push:
    # branches:
    #   - main
    # tags:
    #   - v*
  workflow_dispatch:
    inputs:
      dothttpversion:
        required: true
        description: "dothttp python package version (don't include prefix `v`)"
      dotextensions_version:
        required: false
        description: "binary version of python package, if not provided, we will assume dothttpversion"
      python_version:
        required: false
        default: "3.12.10"
        description: "python version to cook"
      build_windows:
        required: false
        default: "true"
        description: "build windows x86"
        type: boolean
      build_windows_arm:
        required: false
        default: "true"
        description: "build windows arm64"
        type: boolean
      build_linux_amd64:
        required: false
        default: "true"
        description: "build linux amd64 via native runner"
        type: boolean
      build_linux_arm64:
        required: false
        default: "true"
        description: "build linux arm64 via native runner"
        type: boolean
      build_mac:
        required: false
        default: "true"
        description: "build macOS arm (macos-latest)"
        type: boolean
      build_mac_intel:
        required: false
        default: "true"
        description: "build macOS intel (macos-15-intel)"
        type: boolean

env:
  dothttpversion: ${{ github.event.inputs.dothttpversion }}
  dotextensions_version: ${{ github.event.inputs.dothttpversion || github.event.inputs.dotextensions_version }}
  python_version: ${{ github.event.inputs.python_version }}
  pyinstaller_version: 6.1.0
  build_id: ${{ github.run_id }}
  build_number: ${{ github.run_number }}
  commit: ${{ github.sha }}
  source: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
jobs:
  push-windows:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - name: install dothttp-req
        shell: powershell
        run: |
          pip install pyinstaller==${{ env.pyinstaller_version }}
          pip install pip-licenses
          pip install dothttp_req==${{ env.dothttpversion }}
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/http.tx -OutFile http.tx
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/postScript.js -OutFile postScript.js
          pip-licenses --format=json --output-file=licenses.json -l
          pyinstaller --distpath dist .\cli.py --add-data 'http.tx;.' --add-data 'postScript.js;.' --add-data 'licenses.json:.' --additional-hooks-dir=custom_hooks
          $pyVersion = python --version 2>&1 | Select-String -Pattern '\d+\.\d+\.\d+' | ForEach-Object { $_.Matches[0].Value }
          [ordered]@{
            version      = $env:dotextensions_version
            dothttp_req  = $env:dothttpversion
            python       = $pyVersion
            pyinstaller  = $env:pyinstaller_version
            platform     = "windows-x86"
            runner_os    = $env:RUNNER_OS
            runner_arch  = $env:RUNNER_ARCH
            build_id     = $env:build_id
            build_number = $env:build_number
            commit       = $env:commit
            source       = $env:source
          } | ConvertTo-Json | Set-Content -Path dist\cli\version.json
          Compress-Archive -DestinationPath dotextensions-windows-x86.zip  -Path  dist\cli
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-windows-x86.zip
          file: dotextensions-windows-x86.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  push-windows-arm:
    if: ${{ github.event.inputs.build_windows_arm == 'true' }}
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python_version }}
          architecture: "arm64"
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: install dothttp-req
        shell: powershell
        run: |
          pip install pyinstaller==${{ env.pyinstaller_version }}
          pip install pip-licenses
          pip install dothttp_req==${{ env.dothttpversion }}
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/http.tx -OutFile http.tx
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/postScript.js -OutFile postScript.js
          pip-licenses --format=json --output-file=licenses.json -l
          pyinstaller --distpath dist .\cli.py --add-data 'http.tx;.' --add-data 'postScript.js;.' --add-data 'licenses.json:.' --additional-hooks-dir=custom_hooks
          $pyVersion = python --version 2>&1 | Select-String -Pattern '\d+\.\d+\.\d+' | ForEach-Object { $_.Matches[0].Value }
          [ordered]@{
            version      = $env:dotextensions_version
            dothttp_req  = $env:dothttpversion
            python       = $pyVersion
            pyinstaller  = $env:pyinstaller_version
            platform     = "windows-arm64"
            runner_os    = $env:RUNNER_OS
            runner_arch  = $env:RUNNER_ARCH
            build_id     = $env:build_id
            build_number = $env:build_number
            commit       = $env:commit
            source       = $env:source
          } | ConvertTo-Json | Set-Content -Path dist\cli\version.json
          Compress-Archive -DestinationPath dotextensions-windows-arm64.zip -Path dist\cli
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-windows-arm64.zip
          file: dotextensions-windows-arm64.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  push-linux-amd64:
    if: ${{ github.event.inputs.build_linux_amd64 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download earthly
        run: sudo /bin/sh -c 'wget https://github.com/earthly/earthly/releases/download/v0.6.19/earthly-linux-amd64 -O /usr/local/bin/earthly && chmod +x /usr/local/bin/earthly'
      - name: Build
        run: |
          earthly +build --VERSION=${{ env.dothttpversion }} --PYTHON_TAG=${{ env.python_version }} --RUNNER_OS=$RUNNER_OS --RUNNER_ARCH=$RUNNER_ARCH --BUILD_ID=$build_id --BUILD_NUMBER=$build_number --COMMIT=$commit --SOURCE=$source
          mv cli-linux/amd64.zip dotextensions-linux-amd64.zip
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-linux-amd64.zip
          file: dotextensions-linux-amd64.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  push-linux-arm64:
    if: ${{ github.event.inputs.build_linux_arm64 == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Download earthly
        run: sudo /bin/sh -c 'wget https://github.com/earthly/earthly/releases/download/v0.6.19/earthly-linux-arm64 -O /usr/local/bin/earthly && chmod +x /usr/local/bin/earthly'
      - name: Build
        run: |
          earthly +build --VERSION=${{ env.dothttpversion }} --PYTHON_TAG=${{ env.python_version }} --RUNNER_OS=$RUNNER_OS --RUNNER_ARCH=$RUNNER_ARCH --BUILD_ID=$build_id --BUILD_NUMBER=$build_number --COMMIT=$commit --SOURCE=$source
          mv cli-linux/arm64.zip dotextensions-linux-arm64.zip
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-linux-arm64.zip
          file: dotextensions-linux-arm64.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  push-mac:
    if: ${{ github.event.inputs.build_mac == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: install dothttp
        run: |
          pip install pyinstaller==${{ env.pyinstaller_version }}
          pip install pip-licenses
          pip install dothttp_req==${{ env.dothttpversion }}
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/http.tx
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/postScript.js
          pip-licenses --format=json --output-file=licenses.json -l
          pyinstaller --distpath dist ./cli.py --add-data 'http.tx:.' --add-data 'postScript.js:.' --add-data 'licenses.json:.'  --additional-hooks-dir=custom_hooks  \
              && python3 -c "import json; print(json.dumps({'version': '$dotextensions_version', 'dothttp_req': '$dothttpversion', 'python': '$(python --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')', 'pyinstaller': '$pyinstaller_version', 'platform': 'darwin-arm64', 'runner_os': '$RUNNER_OS', 'runner_arch': '$RUNNER_ARCH', 'build_id': '$build_id', 'build_number': '$build_number', 'commit': '$commit', 'source': '$source'}, indent=2))" > dist/cli/version.json \
              && cd dist/ && zip -r ../cli.zip cli/  \
              && cd .. && rm -rf dist build
          cp cli.zip dothttp-cli.zip
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-darwin-arm64.zip
          file: cli.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  push-mac-intel:
    if: ${{ github.event.inputs.build_mac_intel == 'true' }}
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: install dothttp
        run: |
          pip install pyinstaller==${{ env.pyinstaller_version }}
          pip install pip-licenses
          pip install dothttp_req==${{ env.dothttpversion }}
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/http.tx
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/postScript.js
          pip-licenses --format=json --output-file=licenses.json -l
          pyinstaller --distpath dist ./cli.py --add-data 'http.tx:.' --add-data 'postScript.js:.' --add-data 'licenses.json:.'  --additional-hooks-dir=custom_hooks  \
              && python3 -c "import json; print(json.dumps({'version': '$dotextensions_version', 'dothttp_req': '$dothttpversion', 'python': '$(python --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')', 'pyinstaller': '$pyinstaller_version', 'platform': 'darwin-amd64', 'runner_os': '$RUNNER_OS', 'runner_arch': '$RUNNER_ARCH', 'build_id': '$build_id', 'build_number': '$build_number', 'commit': '$commit', 'source': '$source'}, indent=2))" > dist/cli/version.json \
              && cd dist/ && zip -r ../cli.zip cli/  \
              && cd .. && rm -rf dist build
          cp cli.zip dothttp-cli.zip
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-darwin-amd64.zip
          file: cli.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
