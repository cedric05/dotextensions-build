name: Release prod Artifacts
on:
  # push:
    # branches:
    #   - main
    # tags:
    #   - v*
  workflow_dispatch:
    inputs:
      dothttpversion:
        required: true
        description: "dothttp python package version (don't include prefix `v`)"
      dotextensions_version:
        required: false
        description: "binary version of python package, if not provided, we will assume dothttpversion"
      python_version:
        required: false
        default: "3.12.4"
        description: "python version to cook"
      linux_python_version:
        required: false
        default: "3.12.4"
        description: "linux version python to cook"

env:
  dothttpversion: ${{ github.event.inputs.dothttpversion }}
  dotextensions_version: ${{ github.event.inputs.dothttpversion || github.event.inputs.dotextensions_version }}
  python_version: ${{ github.event.inputs.python_version }}
  linux_python_version: ${{ github.event.inputs.linux_python_version }}
  pyinstaller_version: 6.1.0
  build_id: ${{ github.run_id }}
  build_number: ${{ github.run_number }}
  commit: ${{ github.sha }}
  source: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
jobs:
  push-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - name: install dothttp-req
        shell: powershell
        run: |
          pip install pyinstaller==${{ env.pyinstaller_version }}
          pip install pip-licenses
          pip install dothttp_req==${{ env.dothttpversion }}
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/http.tx -OutFile http.tx
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/postScript.js -OutFile postScript.js
          pip-licenses --format=json --output-file=licenses.json -l
          pyinstaller --distpath dist .\cli.py --add-data 'http.tx;.' --add-data 'postScript.js;.' --add-data 'licenses.json:.' --additional-hooks-dir=custom_hooks
          $pyVersion = python --version 2>&1 | Select-String -Pattern '\d+\.\d+\.\d+' | ForEach-Object { $_.Matches[0].Value }
          [ordered]@{
            version      = $env:dotextensions_version
            dothttp_req  = $env:dothttpversion
            python       = $pyVersion
            pyinstaller  = $env:pyinstaller_version
            platform     = "x86-windows"
            runner_os    = $env:RUNNER_OS
            runner_arch  = $env:RUNNER_ARCH
            build_id     = $env:build_id
            build_number = $env:build_number
            commit       = $env:commit
            source       = $env:source
          } | ConvertTo-Json | Set-Content -Path dist\cli\version.json
          Compress-Archive -DestinationPath dotextensions-x86-windows.zip  -Path  dist\cli
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-x86-windows.zip
          file: dotextensions-x86-windows.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  pushlinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log into registry
        run: echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3
        with:
            image: tonistiigi/binfmt:latest
            platforms: all
      - name: Download latest earthly
        run: "sudo /bin/sh -c 'wget https://github.com/earthly/earthly/releases/download/v0.6.19/earthly-linux-amd64 -O /usr/local/bin/earthly && chmod +x /usr/local/bin/earthly'"
      - name: Build image
        run: |
          earthly +save-all --VERSION=${{ env.dothttpversion }} --PYTHON_TAG=${{ env.linux_python_version }} --RUNNER_OS=$RUNNER_OS --RUNNER_ARCH=$RUNNER_ARCH --BUILD_ID=$build_id --BUILD_NUMBER=$build_number --COMMIT=$commit --SOURCE=$source
          mv cli-linux/amd64.zip cli-amd64.zip
          mv cli-linux/arm64.zip cli-arm64.zip
      - name: Upload arm64 binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-linux-arm64.zip
          file: cli-arm64.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
      - name: Upload amd64 binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-linux-amd64.zip
          file: cli-amd64.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  push-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: install dothttp
        run: |
          pip install pyinstaller==${{ env.pyinstaller_version }}
          pip install pip-licenses
          pip install dothttp_req==${{ env.dothttpversion }}
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/http.tx
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/postScript.js
          pip-licenses --format=json --output-file=licenses.json -l
          pyinstaller --distpath dist ./cli.py --add-data 'http.tx:.' --add-data 'postScript.js:.' --add-data 'licenses.json:.'  --additional-hooks-dir=custom_hooks  \
              && python3 -c "import json; print(json.dumps({'version': '$dotextensions_version', 'dothttp_req': '$dothttpversion', 'python': '$(python --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')', 'pyinstaller': '$pyinstaller_version', 'platform': 'darwin-arm', 'runner_os': '$RUNNER_OS', 'runner_arch': '$RUNNER_ARCH', 'build_id': '$build_id', 'build_number': '$build_number', 'commit': '$commit', 'source': '$source'}, indent=2))" > dist/cli/version.json \
              && cd dist/ && zip -r ../cli.zip cli/  \
              && cd .. && rm -rf dist build
          cp cli.zip dothttp-cli.zip
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-darwin-arm.zip
          file: cli.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
  push-mac-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python_version }}
          architecture: "x64"
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: install dothttp
        run: |
          pip install pyinstaller==${{ env.pyinstaller_version }}
          pip install pip-licenses
          pip install dothttp_req==${{ env.dothttpversion }}
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/http.tx
          wget https://raw.githubusercontent.com/cedric05/dothttp/v${{ env.dothttpversion }}/dothttp/postScript.js
          pip-licenses --format=json --output-file=licenses.json -l
          pyinstaller --distpath dist ./cli.py --add-data 'http.tx:.' --add-data 'postScript.js:.' --add-data 'licenses.json:.'  --additional-hooks-dir=custom_hooks  \
              && python3 -c "import json; print(json.dumps({'version': '$dotextensions_version', 'dothttp_req': '$dothttpversion', 'python': '$(python --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')', 'pyinstaller': '$pyinstaller_version', 'platform': 'darwin', 'runner_os': '$RUNNER_OS', 'runner_arch': '$RUNNER_ARCH', 'build_id': '$build_id', 'build_number': '$build_number', 'commit': '$commit', 'source': '$source'}, indent=2))" > dist/cli/version.json \
              && cd dist/ && zip -r ../cli.zip cli/  \
              && cd .. && rm -rf dist build
          cp cli.zip dothttp-cli.zip
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: dotextensions-${{ env.dotextensions_version }}-darwin.zip
          file: cli.zip
          tag: v-${{ env.dotextensions_version }}
          overwrite: true
